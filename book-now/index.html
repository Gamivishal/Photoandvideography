<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Now – Yash Raj Motion Picture | Ahmedabad</title>
  <meta name="description"
    content="Book your photography session with Yash Raj Motion Picture." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link rel="stylesheet" href="../css/animations.css" />
</head>

<body>

  <div id="loader" class="loader">
    <div class="loader-inner">
      <div class="loader-logo">Yash Raj</div>
      <div class="loader-bar"><span></span></div>
    </div>
  </div>
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-circle" id="cursorCircle"></div>

  <script src="../js/header.js"></script>

  <!-- BOOKING FORM ONLY -->
  <section class="section-pad" style="background: var(--dark); min-height: 80vh; display: flex; align-items: center;">
    <div class="container" style="max-width: 680px;">

      <div class="section-header center" style="margin-bottom: 2.5rem;">
        <span class="section-label">Reserve Your Date</span>
        <h1 style="font-family:var(--font-display); font-size:2.5rem; color:var(--light); margin-top:0.5rem;">Book Now</h1>
      </div>

      <div class="contact-form reveal-up" style="width: 100%;">
        <form id="bookingForm" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="bookName">Your Name *</label>
              <input type="text" id="bookName" name="yourName" class="form-control" placeholder="Your full name" required />
              <div class="field-error" id="bookNameError" aria-live="polite"></div>
            </div>
            <div class="form-group">
              <label for="bookPartner">Partner's Name</label>
              <input type="text" id="bookPartner" name="partnerName" class="form-control" placeholder="Partner's name (if applicable)" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="bookEmail">Email Address *</label>
              <input type="email" id="bookEmail" name="email" class="form-control" placeholder="your@email.com" required />
              <div class="field-error" id="bookEmailError" aria-live="polite"></div>
            </div>
            <div class="form-group">
              <label for="bookPhone">WhatsApp / Phone *</label>
              <input type="tel" id="bookPhone" name="phone" class="form-control" placeholder="+91 XXXXX XXXXX" required />
              <div class="field-error" id="bookPhoneError" aria-live="polite"></div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="bookDate">Event Date</label>
              <input type="date" id="bookDate" name="eventDate" class="form-control" />
            </div>
            <div class="form-group">
              <label for="bookCity">Event City</label>
              <input type="text" id="bookCity" name="eventCity" class="form-control" placeholder="e.g. Ahmedabad, Surat" />
            </div>
          </div>
          <div class="form-group">
            <label for="bookCategory">Category *</label>
            <select id="bookCategory" name="category" class="form-control form-select" required>
              <option value="">Select a category...</option>
              <option value="wedding">Wedding</option>
              <option value="pre-wedding">Pre‑Wedding</option>
              <option value="corporate">Corporate</option>
              <option value="events">Events</option>
              <option value="product">Product</option>
            </select>
            <div class="field-error" id="bookCategoryError" aria-live="polite"></div>
          </div>
          <div class="form-group">
            <label for="bookBudget">Approximate Budget</label>
            <select id="bookBudget" name="budget" class="form-control form-select">
              <option value="">Select budget range...</option>
              <option value="under25k">Under ₹25,000</option>
              <option value="25-50k">₹25,000 – ₹50,000</option>
              <option value="50-1L">₹50,000 – ₹1,00,000</option>
              <option value="1-2L">₹1,00,000 – ₹2,00,000</option>
              <option value="2-3L">₹2,00,000 – ₹3,00,000</option>
              <option value="3L+">₹3,00,000+</option>
              <option value="custom">Custom / To be discussed</option>
            </select>
          </div>
          <div class="form-group">
            <label for="bookMessage">Tell Us More</label>
            <textarea id="bookMessage" name="message" class="form-control"
              placeholder="Tell us about your event, venue, style preferences..."></textarea>
          </div>
          <div class="form-submit">
            <button type="submit" class="btn-primary" id="bookSubmitBtn" style="width:100%;">Book Now</button>
          </div>
          <div id="bookFormMessage" class="form-message"></div>
        </form>
      </div>

    </div>
  </section>

  <script src="../js/footer.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/animations.js"></script>
</body>

</html>
